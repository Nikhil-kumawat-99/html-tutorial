 <script>
function toggleMenu() {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");

  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");
}
</script>

           
          <div class="calculator"> 

  <div class="buttons">
    <button id="clear" onclick="backspace()">.</button>
    <button id="ca" onclick="clearDisplay()">AC</button>
    <button id="percentage" onclick="press('%')">%</button>
    <button id="divide"  onclick="press('/')">÷</button>

    
    <button onclick="press('7')">7</button>

    <button onclick="press('4')">4</button>

    <button id="addition" onclick="press('+')">+</button>
     
    <button onclick="sign()">+/-</button>
